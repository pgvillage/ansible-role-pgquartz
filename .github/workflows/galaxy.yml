---
name: Publish to Galaxy

on:
  push:
    tags:
      - "v*"

jobs:
  galaxy:
    runs-on: ubuntu-latest

    steps:
      # Stap 1: De code uitchecken (nodig zodat ansible-galaxy context heeft, indien gewenst)
      - name: Checkout code
        uses: actions/checkout@v4

      # Stap 2: Python installeren (vereist voor Ansible)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Stap 3: Ansible installeren via pip
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      # Stap 4: De rol importeren in Ansible Galaxy
      - name: Trigger Galaxy import via CLI
        run: |
          ansible-galaxy role import \
            --api-key "${{ secrets.GALAXY_TOKEN }}" \
            ${{ github.repository_owner }} \
            ${{ github.event.repository.name }}
